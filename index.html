<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulación de Funciones</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<h2>Plano cartesiano interactivo</h2>
<div id="grafica" style="width:100%;height:90vh;"></div>

<script>
  let x = [];
  for (let i = -10; i <= 10; i += 0.1) {
    x.push(i);
  }

  // Funciones
  let y1 = x.map(v => v*v - 4*v + 3); // f(x)
  let y2 = x.map(v => 2*v + 1);       // g(x)
  let y3 = x.map(v => -1);            // t(x)

  let trace1 = {
    x: x,
    y: y1,
    mode: 'lines',
    name: 'f(x) = x² - 4x + 3'
  };

  let trace2 = {
    x: x,
    y: y2,
    mode: 'lines',
    name: 'g(x) = 2x + 1'
  };

  let trace3 = {
    x: x,
    y: y3,
    mode: 'lines',
    name: 't(x) = -1'
  };

  let layout = {
    title: 'Simulación interactiva de funciones',
    dragmode: 'pan',
    hovermode: 'closest',
    xaxis: { title: 'Eje X' },
    yaxis: { title: 'Eje Y' }
  };

  Plotly.newPlot('grafica', [trace1, trace2, trace3], layout);
</script>

</body>
</html>
